<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #39ff14;
      margin-bottom: 8px;
      text-shadow: 0 0 12px #39ff1480;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: #888;
    }

    #scoreboard span { color: #e0e0e0; }

    canvas {
      border: 2px solid #2a2a2a;
      background: #111;
      display: block;
      image-rendering: pixelated;
    }

    #message {
      margin-top: 18px;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: #555;
      height: 20px;
      text-align: center;
    }

    #message.active { color: #39ff14; }

    #controls {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(2, 44px);
      gap: 6px;
    }

    .ctrl-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #aaa;
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: background 0.1s;
    }

    .ctrl-btn:active { background: #252525; color: #39ff14; }
    #btn-up    { grid-column: 2; grid-row: 1; }
    #btn-left  { grid-column: 1; grid-row: 2; }
    #btn-down  { grid-column: 2; grid-row: 2; }
    #btn-right { grid-column: 3; grid-row: 2; }
  </style>
</head>
<body>

  <h1>Snake</h1>

  <div id="scoreboard">
    SCORE <span id="score">0</span>
    &nbsp;&nbsp;
    BEST <span id="best">0</span>
  </div>

  <canvas id="canvas" width="400" height="400"></canvas>

  <div id="message" class="active">Press any arrow key to start</div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-up">↑</button>
    <button class="ctrl-btn" id="btn-left">←</button>
    <button class="ctrl-btn" id="btn-down">↓</button>
    <button class="ctrl-btn" id="btn-right">→</button>
  </div>

<script>
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const msgEl   = document.getElementById('message');

  const COLS = 20, ROWS = 20;
  const CELL = canvas.width / COLS;

  let snake, dir, nextDir, food, score, best, loop, running, started;

  function init() {
    snake   = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    dir     = {x:1, y:0};
    nextDir = {x:1, y:0};
    score   = 0;
    running = false;
    started = false;
    scoreEl.textContent = 0;
    placeFood();
    draw();
    msgEl.textContent = 'Press any arrow key to start';
    msgEl.className = 'active';
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function step() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > (best || 0)) {
        best = score;
        bestEl.textContent = best;
      }
      placeFood();
      // Speed up slightly every 5 points
      if (score % 5 === 0) {
        clearInterval(loop);
        const speed = Math.max(80, 200 - score * 4);
        loop = setInterval(step, speed);
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid (subtle)
    ctx.strokeStyle = '#181818';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(canvas.width, j * CELL); ctx.stroke();
    }

    // Food
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 10;
    ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
    ctx.shadowBlur = 0;

    // Snake
    snake.forEach((seg, i) => {
      const t = i / snake.length;
      // Head is bright green, tail fades
      const g = Math.round(255 - t * 140);
      ctx.fillStyle = i === 0 ? '#39ff14' : `rgb(30, ${g}, 20)`;
      if (i === 0) {
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur = 8;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
    });
    ctx.shadowBlur = 0;
  }

  function gameOver() {
    clearInterval(loop);
    running = false;
    msgEl.textContent = `Game over — score ${score}. Press any arrow to restart`;
    msgEl.className = 'active';

    // Flash effect
    let flashes = 0;
    const flash = setInterval(() => {
      ctx.fillStyle = `rgba(255,60,60,${flashes % 2 === 0 ? 0.15 : 0})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (++flashes > 5) clearInterval(flash);
    }, 100);
  }

  function startGame() {
    if (running) return;
    if (started) init();
    started = true;
    running = true;
    msgEl.textContent = '';
    msgEl.className = '';
    loop = setInterval(step, 200);
  }

  // Keyboard
  const DIRS = {
    ArrowUp:    {x:0,  y:-1},
    ArrowDown:  {x:0,  y:1},
    ArrowLeft:  {x:-1, y:0},
    ArrowRight: {x:1,  y:0},
  };

  document.addEventListener('keydown', e => {
    if (!DIRS[e.key]) return;
    e.preventDefault();
    const d = DIRS[e.key];
    // Prevent reversing
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
    if (!running) startGame();
  });

  // Mobile buttons
  document.getElementById('btn-up').addEventListener('click',    () => setDir(DIRS.ArrowUp));
  document.getElementById('btn-down').addEventListener('click',  () => setDir(DIRS.ArrowDown));
  document.getElementById('btn-left').addEventListener('click',  () => setDir(DIRS.ArrowLeft));
  document.getElementById('btn-right').addEventListener('click', () => setDir(DIRS.ArrowRight));

  function setDir(d) {
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
    if (!running) startGame();
  }

  init();
</script>
</body>
</html>
